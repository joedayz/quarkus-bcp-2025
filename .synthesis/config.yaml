# Synthesis Workspace Configuration
# Generated by: synthesis init

workspace:
  name: "quarkus-bcp-2025"
  type: "general"
  description: ""
  metadata:
    category: "mixed"

# report:
#   outputDir: "reports"  # Custom report output directory
#                         # Relative to workspace root, or absolute path
#                         # Default: .synthesis/reports/

scan:
  # File patterns to include in the index
  includePatterns:
    - "**/*.md"
    - "**/*.java"
    - "**/*.py"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.json"
    - "**/*.sh"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.kt"
    - "**/*.sql"
    - "**/*.txt"
    - "**/*.pdf"

  # Directories and patterns to exclude
  excludePatterns:
    - "**/node_modules/**"
    - "**/.git/**"
    - "**/target/**"
    - "**/build/**"
    - "**/__pycache__/**"
    - "**/.venv/**"
    - "**/.synthesis/**"

  # Compute MD5 hashes for duplicate detection
  computeHashes: true

  # Skip files larger than this (bytes)
  maxFileSizeBytes: 10485760

search:
  maxResults: 20
  previewLength: 200
  contentPreviewBytes: 10240

ai:
  # Set to true and provide ANTHROPIC_API_KEY to enable AI features
  enabled: false
  model: "claude-sonnet-4-5-20250929"
  readmeGeneration: true
  contentSummary: false
  maxTokens: 1024
